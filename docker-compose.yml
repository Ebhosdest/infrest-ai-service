version: "3.8"

services:
  db:
    image: postgres:15
    container_name: infrest-db
    environment:
      POSTGRES_DB: infrest_erp
      POSTGRES_USER: infrest
      POSTGRES_PASSWORD: infrest_dev_2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrest -d infrest_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infrest-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
